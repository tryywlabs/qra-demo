<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ module.title }} Directory</title>
    <style>
        :root {
            --bg: #f4f0e8;
            --ink: #1d2a33;
            --muted: #63727a;
            --panel: rgba(255, 251, 245, 0.88);
            --line: rgba(29, 42, 51, 0.12);
            --shadow: 0 22px 50px rgba(29, 42, 51, 0.1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Avenir Next", "Segoe UI", sans-serif;
            color: var(--ink);
            background: linear-gradient(180deg, #f8f5f0 0%, var(--bg) 100%);
        }

        .shell {
            width: min(980px, calc(100% - 2rem));
            margin: 0 auto;
            padding: 2rem 0 3rem;
        }

        .back {
            display: inline-block;
            margin-bottom: 1rem;
            color: var(--muted);
            text-decoration: none;
            font-weight: 600;
        }

        .panel {
            padding: 1.4rem;
            border: 1px solid var(--line);
            border-radius: 24px;
            background: var(--panel);
            box-shadow: var(--shadow);
        }

        h1 {
            margin: 0 0 0.4rem;
            font-size: clamp(2.1rem, 4vw, 3.8rem);
            letter-spacing: -0.04em;
        }

        .lede {
            margin: 0 0 1.2rem;
            color: var(--muted);
            line-height: 1.7;
        }

        .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 1.2rem;
        }

        .pill {
            padding: 0.45rem 0.7rem;
            border-radius: 999px;
            background: rgba(29, 42, 51, 0.08);
            font-size: 0.86rem;
        }

        .script-list {
            display: grid;
            gap: 0.8rem;
        }

        .script {
            padding: 0.95rem 1rem;
            border: 1px solid var(--line);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.58);
            font-family: "SFMono-Regular", "Cascadia Code", monospace;
        }

        .empty {
            padding: 1rem;
            border-radius: 18px;
            background: rgba(29, 42, 51, 0.05);
            color: var(--muted);
        }
    </style>
</head>
<body>
    <main class="shell">
        <a class="back" href="{% url 'home' %}">Back to landing page</a>
        <section class="panel">
            <h1>{{ module.title }}</h1>
            <p class="lede">{{ module.description }}</p>
            <div class="meta">
                <span class="pill">Directory: {{ module.directory_name }}</span>
                <span class="pill">{{ module.script_count }} scripts discovered</span>
            </div>

            {% if scripts %}
                <div class="script-list">
                    {% for script in scripts %}
                        <div class="script">{{ script }}</div>
                    {% endfor %}
                </div>
            {% else %}
                <div class="empty">No Python scripts are present in this directory yet.</div>
            {% endif %}
        </section>
    </main>
</body>
</html>
